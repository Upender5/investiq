networks:
  investiq-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  # ── PostgreSQL 16 + TimescaleDB ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: investiq-postgres
    # chmod ensures init.sh runs on Linux hosts (Docker Desktop for Windows grants exec automatically)
    entrypoint:
      - /bin/bash
      - -c
      - |
        chmod +x /docker-entrypoint-initdb.d/*.sh
        exec /usr/local/bin/docker-entrypoint.sh postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-investiq}
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-investiq}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── Redis 7 (standalone for local dev — use Redis Cluster in prod) ──────────
  # Host port 6380 avoids conflict with any existing Redis on 6379.
  # Docker-internal services still reach this via redis:6379.
  redis:
    image: redis:7-alpine
    container_name: investiq-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - investiq-net
    restart: unless-stopped

  # MongoDB: using local install — connect via Compass at localhost:27017

  # ── Kafka 3.7 (KRaft mode — no ZooKeeper needed) ───────────────────────────
  # Docker-internal:  kafka:9092   (PLAINTEXT, for services in investiq-net)
  # Host access:      localhost:9094 (EXTERNAL, for local tools / IDE)
  # ── Kafka 3.7 (KRaft mode, official Apache image) ──────────────────────────
  # Docker-internal:  kafka:9092   (PLAINTEXT, for services in investiq-net)
  # Host access:      localhost:9094 (EXTERNAL, for local tools / IDE)
  kafka:
    image: apache/kafka:3.7.1
    container_name: investiq-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms256m}
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── AI Advisor (FastAPI, port 9001) ────────────────────────────────────────
  ai-advisor:
    build: ./services/ai-advisor
    container_name: investiq-ai-advisor
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL:       ${CLAUDE_MODEL:-claude-sonnet-4-6}
      REDIS_HOST:         redis
      REDIS_PORT:         6379
      REDIS_PASSWORD:     ${REDIS_PASSWORD}
      JWT_SECRET:         ${JWT_SECRET}
      TZ: Asia/Kolkata
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - investiq-net
    restart: unless-stopped

  # pgAdmin: using local install — connect to postgres at localhost:5432