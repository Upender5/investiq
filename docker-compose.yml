networks:
  investiq-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  mongodb-data:
  zookeeper-data:
  kafka-data:
  pgadmin-data:

services:

  # ── PostgreSQL 16 + TimescaleDB ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: investiq-postgres
    # chmod ensures init.sh runs on Linux hosts (Docker Desktop for Windows grants exec automatically)
    entrypoint:
      - /bin/bash
      - -c
      - |
        chmod +x /docker-entrypoint-initdb.d/*.sh
        exec /usr/local/bin/docker-entrypoint.sh postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-investiq}
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-investiq}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── Redis 7 (standalone for local dev — use Redis Cluster in prod) ──────────
  redis:
    image: redis:7-alpine
    container_name: investiq-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - investiq-net
    restart: unless-stopped

  # ── MongoDB 7 ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: investiq-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: investiq
      TZ: Asia/Kolkata
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --username
        - ${MONGO_USERNAME}
        - --password
        - ${MONGO_PASSWORD}
        - --authenticationDatabase
        - admin
        - --eval
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── ZooKeeper 3.9 ──────────────────────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: investiq-zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_HEAP_SIZE: "256"
      TZ: Asia/Kolkata
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── Kafka 3.6 (ZooKeeper mode) ──────────────────────────────────────────────
  # Docker-internal:  kafka:9092   (PLAINTEXT, for services in investiq-net)
  # Host access:      localhost:9094 (EXTERNAL, for local tools / IDE)
  kafka:
    image: bitnami/kafka:3.6
    container_name: investiq-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_ENABLE_KRAFT: "no"
      KAFKA_CFG_BROKER_ID: "1"
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms256m}
      TZ: Asia/Kolkata
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── AI Advisor (FastAPI, port 9001) ────────────────────────────────────────
  ai-advisor:
    build: ./services/ai-advisor
    container_name: investiq-ai-advisor
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL:       ${CLAUDE_MODEL:-claude-sonnet-4-6}
      REDIS_HOST:         redis
      REDIS_PORT:         6379
      REDIS_PASSWORD:     ${REDIS_PASSWORD}
      JWT_SECRET:         ${JWT_SECRET}
      TZ: Asia/Kolkata
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── pgAdmin 4 ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: investiq-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:           ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:        ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:      "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      TZ: Asia/Kolkata
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infra/docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/misc/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - investiq-net
    restart: unless-stopped
