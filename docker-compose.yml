      - "8087:8087"
    networks:
      - investiq-net
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # PYTHON / FASTAPI SERVICES
  # ────────────────────────────────────────────────────────────────────────────

  # ── AI Advisor (9001) ───────────────────────────────────────────────────────
  ai-advisor:
    build: ./services/ai-advisor
    container_name: investiq-ai-advisor
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL:      ${CLAUDE_MODEL:-claude-sonnet-4-6}
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      JWT_SECRET:        ${JWT_SECRET}
      TZ: Asia/Kolkata
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - investiq-net
    restart: unless-stopped

  # ── ML Scoring Service (9002) ───────────────────────────────────────────────
  ml-scoring-service:
    build: ./services/ml-scoring-service
    container_name: investiq-ml-scoring
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET:     ${JWT_SECRET}
      TZ: Asia/Kolkata
    ports:
      - "9002:9002"
    networks:
      - investiq-net
    restart: unless-stopped

  # ── Analytics Service (9003) ────────────────────────────────────────────────
  analytics-service:
    build: ./services/analytics-service
    container_name: investiq-analytics
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGO_URI:      mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017
      MONGO_DB:       investiq_analytics
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET:     ${JWT_SECRET}
      TZ: Asia/Kolkata
    ports:
      - "9003:9003"
    networks:
      - investiq-net
    restart: unless-stopped

  # ── Background Jobs (9004) ──────────────────────────────────────────────────
  background-jobs:
    build: ./services/background-jobs
    container_name: investiq-background-jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_USER:        ${POSTGRES_USER}
      DB_PASSWORD:    ${POSTGRES_PASSWORD}
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET:     ${JWT_SECRET}
      TZ: Asia/Kolkata
    ports:
      - "9004:9004"
    networks:
      - investiq-net
    restart: unless-stopped
