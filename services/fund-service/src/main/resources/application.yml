server:
  port: 8087
  servlet:
    context-path: /

spring:
  application:
    name: fund-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/investiq_funds
    username: ${DB_USER:investiq}
    password: ${DB_PASS:Investiq@1301}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:redis@123}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-32-chars-required}
  access-token-expiry-ms: 900000

app:
  kafka:
    topics:
      fund-invested: fund.invested
      fund-redeemed: fund.redeemed
      sip-created: sip.created
      sip-status-changed: sip.status.changed

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.investiq: DEBUG
