spring:
  application:
    name: trade-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/investiq_trades}
    username: ${DB_USERNAME:investiq}
    password: ${DB_PASSWORD:investiq}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: trade-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        spring.json.add.type.headers: false
    listener:
      ack-mode: manual_immediate

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-256-bit-base64-secret-in-prod}
  kafka:
    topics:
      trade-funded: trade.funded
      trade-executed: trade.executed
  broker:
    provider: ${BROKER_PROVIDER:mock}   # mock | kite
    kite:
      api-key: ${KITE_API_KEY:}
      access-token: ${KITE_ACCESS_TOKEN:}
      base-url: https://api.kite.trade
