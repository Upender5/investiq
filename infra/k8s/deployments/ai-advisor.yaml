apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-advisor
  namespace: investiq
  labels:
    app: ai-advisor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-advisor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-advisor
    spec:
      containers:
        - name: ai-advisor
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/investiq/ai-advisor:latest
          ports:
            - containerPort: 9001
          envFrom:
            - secretRef:
                name: investiq-secrets
            - configMapRef:
                name: investiq-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 20
            periodSeconds: 10
