apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: investiq
  labels:
    app: market-data-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/investiq/market-data-service:latest
          ports:
            - containerPort: 8085
          envFrom:
            - secretRef:
                name: investiq-secrets
            - configMapRef:
                name: investiq-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
