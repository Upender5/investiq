apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-service
  namespace: investiq
  labels:
    app: trade-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trade-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: trade-service
    spec:
      containers:
        - name: trade-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/investiq/trade-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - secretRef:
                name: investiq-secrets
            - configMapRef:
                name: investiq-config
          env:
            - name: DB_URL
              value: "jdbc:postgresql://$(POSTGRES_URL)/investiq_trades"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: investiq-secrets
                  key: POSTGRES_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investiq-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
