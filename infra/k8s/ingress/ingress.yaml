apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: investiq-ingress
  namespace: investiq
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: <ACM_CERT_ARN>
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/tags: "Environment=production,App=investiq"
spec:
  rules:
    - host: api.investiq.in
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8081
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8082
          - path: /api/v1/trades
            pathType: Prefix
            backend:
              service:
                name: trade-service
                port:
                  number: 8083
          - path: /api/v1/wallet
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 8084
          - path: /api/v1/market
            pathType: Prefix
            backend:
              service:
                name: market-data-service
                port:
                  number: 8085
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8086
          - path: /api/v1/advisor
            pathType: Prefix
            backend:
              service:
                name: ai-advisor
                port:
                  number: 9001
          - path: /api/v1/scoring
            pathType: Prefix
            backend:
              service:
                name: ml-scoring-service
                port:
                  number: 9002
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 9003
